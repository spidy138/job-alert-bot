name: Discord Channel Purge

on:
  schedule:
    - cron: '0 15 * * *'   # 3 PM UTC
    - cron: '0 1 * * *'    # 1 AM UTC
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Purge Discord channel
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          PURGE_OLDER_THAN_H: '0'
        run: python purge.py
